<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClosetDice - Log In</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center h-screen px-4">

    <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100 max-w-sm w-full">
        <div class="text-center mb-6">
            <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight">🎲 ClosetDice</h1>
            <p class="text-sm text-gray-500 mt-2">Simplify your mornings. Log in to your wardrobe.</p>
        </div>

        <form method="post" class="space-y-4">
            {% csrf_token %}
            
            {% if form.errors %}
                <div class="p-3 bg-red-50 text-red-600 text-sm rounded-lg border border-red-100">
                    Your username and password didn't match. Please try again.
                </div>
            {% endif %}

            <div>
                <label for="id_username" class="block text-xs font-semibold text-gray-600 uppercase tracking-wider mb-1">Username</label>
                <input type="text" name="username" id="id_username" required
                       class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-black focus:border-transparent transition text-sm">
            </div>

            <div>
                <label for="id_password" class="block text-xs font-semibold text-gray-600 uppercase tracking-wider mb-1">Password</label>
                <input type="password" name="password" id="id_password" required
                       class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-black focus:border-transparent transition text-sm">
            </div>

            <button type="submit" 
                    class="w-full bg-black text-white py-3 rounded-xl font-medium text-sm hover:bg-gray-900 transition shadow-sm cursor-pointer mt-2">
                Sign In
            </button>
        </form>

        <div class="text-center mt-6 pt-4 border-t border-gray-100">
            <p class="text-xs text-gray-500">New around here? <a href="#" class="font-semibold text-black hover:underline">Create an account</a></p>
        </div>
    </div>

</body>
</html>
