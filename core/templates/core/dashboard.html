<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClosetDice - Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-50 h-screen flex flex-col items-center justify-center">

    <div class="text-center space-y-4 p-6 bg-white rounded-2xl shadow-sm border border-gray-100 max-w-md">
        <h1 class="text-2xl font-bold text-gray-900">🎉 Welcome to your ClosetDice Dashboard, {{ user.username }}!</h1>
        <p class="text-gray-500 text-sm">Your database models are linked, your authentication is locked down, and you are successfully logged in.</p>
        
        <form action="{% url 'logout' %}" method="post" class="pt-2">
            {% csrf_token %}
            <button type="submit" class="bg-red-50 text-red-600 px-4 py-2 rounded-xl text-sm font-medium hover:bg-red-100 transition cursor-pointer">
                Log Out
            </button>
        </form>
    </div>

</body>
</html>
